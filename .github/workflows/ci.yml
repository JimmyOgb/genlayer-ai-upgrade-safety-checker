name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    name: Lint & test contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache GenVM SDK (direct-mode test runner)
        uses: actions/cache@v4
        with:
          path: ~/.cache/gltest-direct
          key: gltest-direct-sdk-${{ runner.os }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Ruff (style)
        run: ruff check contracts/ tests/

      - name: GenVM lint (AST-based safety checks, e.g. storage-outside-init)
        run: genvm-lint lint contracts/upgrade_safety_checker.py

      - name: Direct-mode tests (mocked web/LLM, no live network)
        run: pytest tests/direct -v

  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build
        env:
          VITE_CONTRACT_ADDRESS: "0x222201F7742dac79Aa37cd6aC5242F65eb303745"
